<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Range Chart Analyzer — starting…</title>
<meta http-equiv="refresh" content="1; url=/" />
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1f2937 0%, #0b1220 60%, #05080f 100%);
    color: #cbd5e1; font: 14px/1.5 system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    display: grid; place-items: center;
  }
  .card { text-align: center; max-width: 420px; padding: 28px 32px; }
  h1 { margin: 12px 0 4px; font-size: 18px; color: #e2e8f0; font-weight: 600; letter-spacing: 0.2px; }
  p  { margin: 6px 0; color: #94a3b8; font-size: 13px; }
  .ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 3px solid rgba(148, 163, 184, 0.18);
    border-top-color: #38bdf8;
    animation: spin 0.9s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .lang { display: flex; gap: 12px; justify-content: center; margin-top: 10px; color: #64748b; font-size: 12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="ring" aria-hidden="true"></div>
    <h1 id="t">Connecting…</h1>
    <p id="s">Waiting for the local backend to finish starting up.</p>
    <div class="lang">
      <span>连接中…</span><span>接続中…</span>
    </div>
  </div>
<script>
  // Polls GET / every 500ms; once 200, jump straight there (faster than meta-refresh).
  (function () {
    var tries = 0, max = 30;
    function tick() {
      tries++;
      fetch('/', { method: 'GET', cache: 'no-store' })
        .then(function (r) { if (r.ok) { location.replace('/'); } else { retry(); } })
        .catch(retry);
    }
    function retry() {
      if (tries >= max) { location.replace('/'); return; }
      setTimeout(tick, 500);
    }
    tick();
  })();
</script>
</body>
</html>
